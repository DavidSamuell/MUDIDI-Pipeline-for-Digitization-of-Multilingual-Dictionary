version: 1
kind: inference

input:
  pages: ../../../dataset/MUDIDI/dictionaries/Evenki-Russian/Dictionary pages
  alphabet: ../../../dataset/MUDIDI/dictionaries/Evenki-Russian/Alphabet list/alphabet.txt
  dictionary_profile:
    headword:
      language: Evenki
      script: Cyrillic
    targets:
      - language: Russian
        script: Cyrillic
    page_layout: inline_entries
    information_types: [translation, part_of_speech, example]

output:
  directory: ../../../outputs/evenki-russian

pipeline:
  stage: all
  stage1_mode: flat
  parse_rules_pages: ["1"]

models:
  default: gemini/gemini-3-flash-preview
  stage2_pass1: gemini/gemini-3.1-pro-preview
  stage2_pass2: gemini/gemini-3.1-pro-preview
  stage2_reasoning: high
