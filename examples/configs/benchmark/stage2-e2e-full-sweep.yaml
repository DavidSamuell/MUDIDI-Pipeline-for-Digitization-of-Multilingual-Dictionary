version: 1
kind: benchmark_sweep
name: stage2-e2e-full-benchmark

# Provenance: the complete 4-model x 4-context matrix repeated across the
# 10 languages under outputs/benchmark/stage-2-e2e.
base:
  version: 1
  kind: benchmark_run

  input:
    dataset_dir: ../../../dataset/MUDIDI/dictionaries
    stage1_predictions_root: ../../../outputs/benchmark/stage-1
    languages:
      - Evenki-Russian
      - Chukchi-Russian
      - Nahuatl-French
      - Na-English-Chinese-French
      - Kashmiri-English
      - Tiri-English
      - Greek-English
      - Efik-English
      - Circassian-English-Turkish
      - Iñupiatun Eskimo-English

  output:
    directory: ../../../outputs/benchmark/stage-2-e2e

  pipeline:
    stage: "2"
    strategy: two_stage
    stage1_mode: flat
    stage1_input: flat
    stage1_source: predictions

  models:
    stage2_reasoning: high

  runtime:
    experiment_name: gemini31pro_flat_alpha
    use_alphabet: false
    use_ocr_hint: false
    use_introduction: true
    one_page_per_entry: true

name_field: runtime.stage2_experiment_name
experiment_name: "{model}_high_mdf_{context}_from_gemini31pro_flat_alpha"

axes:
  model:
    - id: gemini31pro
      set:
        models.stage2_pass1: gemini/gemini-3.1-pro-preview
        models.stage2_pass2: gemini/gemini-3.1-pro-preview

    - id: gpt55
      set:
        models.stage2_pass1: openrouter/openai/gpt-5.5
        models.stage2_pass2: openrouter/openai/gpt-5.5

    - id: claudeopus47
      set:
        models.stage2_pass1: openrouter/anthropic/claude-opus-4.7
        models.stage2_pass2: openrouter/anthropic/claude-opus-4.7

    - id: qwen3vl235
      set:
        models.stage2_pass1: openrouter/qwen/qwen3-vl-235b-a22b-instruct
        models.stage2_pass2: openrouter/qwen/qwen3-vl-235b-a22b-instruct

  context:
    - id: intro_notoolbox
      set:
        runtime.use_introduction: true
        input.toolbox_pdf: null

    - id: intro_toolbox
      set:
        runtime.use_introduction: true
        input.toolbox_pdf: ../../../assets/Pages from ToolboxReferenceManual.pdf

    - id: nointro_notoolbox
      set:
        runtime.use_introduction: false
        input.toolbox_pdf: null

    - id: nointro_toolbox
      set:
        runtime.use_introduction: false
        input.toolbox_pdf: ../../../assets/Pages from ToolboxReferenceManual.pdf

sweep:
  max_runs: 20
  failure_policy: continue
