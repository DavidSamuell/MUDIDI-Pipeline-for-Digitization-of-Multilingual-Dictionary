<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Active run · MUDIDI</title><link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}"></head>
  <body class="standalone"><main class="review-page"><a class="back-link" href="/">← New run</a><section class="panel review-card"><span class="eyebrow">Worker status</span><h1>Active run</h1>{% if runs %}{% for run in runs %}<a class="run-row" href="/runs/{{ run.run_id }}"><strong>{{ run.run_id }}</strong><span>{{ run.status_label }}</span><small>{{ run.completed_pages }} of {{ run.total_pages }} pages</small></a>{% endfor %}{% else %}<div class="empty-state"><h2>No inference is running</h2><p>Queued and completed work remains available in Run history.</p></div>{% endif %}</section></main></body>
</html>
