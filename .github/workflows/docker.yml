name: Docker validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - compose.yaml
      - pyproject.toml
      - uv.lock
      - src/**
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          tags: mudidi-local:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start dashboard
        run: docker compose up --detach --no-build
      - name: Wait for dashboard health
        run: |
          for attempt in {1..18}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          exit 1
      - name: Show container logs after failure
        if: failure()
        run: docker compose logs --no-color --tail=200
      - name: Stop dashboard
        if: always()
        run: docker compose down --volumes --remove-orphans
