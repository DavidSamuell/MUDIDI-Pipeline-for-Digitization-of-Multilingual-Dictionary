name: Local web application

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra web
      - name: Unit and integration coverage
        run: >-
          uv run pytest
          tests/web
          tests/execution/test_contracts.py
          tests/execution/test_approved_pass2.py
          --cov=mudidi.web
          --cov-report=term-missing
          --cov-fail-under=80
      - name: Build distributable wheel
        run: uv build
