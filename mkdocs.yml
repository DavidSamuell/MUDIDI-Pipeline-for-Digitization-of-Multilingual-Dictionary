site_name: MUDIDI
site_description: Multilingual dictionary digitization with language models
site_url: https://davidsamuell.github.io/MUDIDI-Pipeline-for-Digitization-of-Multilingual-Dictionary/
repo_url: https://github.com/DavidSamuell/MUDIDI-Pipeline-for-Digitization-of-Multilingual-Dictionary
repo_name: DavidSamuell/MUDIDI-Pipeline-for-Digitization-of-Multilingual-Dictionary
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: octicons/mark-github-24
extra_css:
  - stylesheets/navigation.css
extra_javascript:
  - javascripts/navigation.js
  - javascripts/toc-panel.js
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            heading_level: 2
markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - YAML configuration: getting-started/configuration.md
      - uv environments: uv.md
  - Production Inference: production/index.md
  - Benchmarking & Evaluation:
      - Overview: benchmarking/index.md
      - Advanced VLM backends: benchmarking/vlm.md
  - Concepts:
      - Pipeline: concepts/pipeline.md
  - Reference:
      - CLI: reference/cli.md
      - YAML configuration: reference/config.md
      - Python API: reference/python-api.md
  - Development:
      - Architecture: development/architecture.md
      - Public docs deployment: development/pages.md
      - CLI migration: development/cli-migration.md
